<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="mobile-web-app-capable" content="yes" />
    <title>Blocky — WebXR Brick Builder</title>
    <style>
      :root { color-scheme: dark; }
      html, body { margin: 0; height: 100%; overflow: hidden; background: #0b0d12; }
      #renderCanvas { width: 100vw; height: 100vh; display: block; touch-action: none; outline: none; }

      /* 2D fallback / pre-XR overlay shown in the flat browser before entering AR. */
      #overlay {
        position: fixed; inset: 0; display: flex; flex-direction: column;
        align-items: center; justify-content: center; gap: 1.25rem;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        color: #e8ecf4; text-align: center; padding: 1.5rem; pointer-events: none;
      }
      #overlay h1 { font-size: 2.4rem; margin: 0; letter-spacing: 0.02em; }
      #overlay p { margin: 0; max-width: 30rem; opacity: 0.8; line-height: 1.5; }
      #enterButton {
        pointer-events: auto; font-size: 1.1rem; font-weight: 600;
        padding: 0.9rem 2.2rem; border: 0; border-radius: 999px; cursor: pointer;
        background: linear-gradient(135deg, #ff5d5d, #ffb13d); color: #1a1205;
        box-shadow: 0 8px 28px rgba(255, 120, 60, 0.35);
      }
      #enterButton:disabled { filter: grayscale(0.7); cursor: not-allowed; opacity: 0.6; }
      /* On-screen debug log mirror (also rendered in-VR). */
      #debugLog {
        position: fixed; left: 0; bottom: 0; max-height: 40vh; width: 100%;
        overflow: auto; font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 11px; color: #9ef0c5; background: rgba(0,0,0,0.55);
        padding: 6px 10px; white-space: pre-wrap; pointer-events: none;
      }
    </style>
  </head>
  <body>
    <canvas id="renderCanvas"></canvas>
    <div id="overlay">
      <h1>🧱 Blocky</h1>
      <p id="status">Checking WebXR support…</p>
      <button id="enterButton" disabled>Enter AR</button>
      <p style="font-size: 0.85rem; opacity: 0.6">
        Meta Quest 3 · passthrough mixed reality · hand tracking
      </p>
    </div>
    <pre id="debugLog"></pre>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
